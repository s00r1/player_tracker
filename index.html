<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Tracker sécurisé</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family: Inter, Arial, sans-serif; background:#081018; color:#eafff4; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 16px; }
    .card { background:#0f1c29; border:1px solid #1f3447; border-radius:14px; padding:16px; margin-bottom:16px; }
    .tabs { display:flex; gap:8px; margin-bottom:12px; }
    .tab { border:1px solid #2b4e69; background:#123148; color:#d8f5ff; border-radius:10px; padding:10px 12px; cursor:pointer; }
    .tab.active { background:#1c5a80; }
    .panel { display:none; }
    .panel.active { display:block; }
    .row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    input, select, button { border-radius:10px; border:1px solid #2e4f67; background:#0b1c2a; color:#e8fbff; padding:10px; }
    input, select { min-width:220px; flex:1; }
    button { cursor:pointer; background:#17547a; }
    button:disabled, select:disabled { opacity:.55; cursor:not-allowed; }
    .status { color:#99d3f2; min-height:22px; }
    .grid { display:grid; gap:12px; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); }
    .item { background:#0a1723; border:1px solid #1f3447; border-radius:10px; padding:12px; }
    .muted { color:#9db2c0; }
    .list { display:grid; gap:8px; margin-top:10px; }
    .small { font-size:13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>⚽ Player Tracker sécurisé</h1>
    <div class="card">
      <div class="tabs">
        <button class="tab active" data-mode="player">Recherche joueur</button>
        <button class="tab" data-mode="club">Joueurs d'un club</button>
      </div>

      <div id="playerPanel" class="panel active">
        <div class="row">
          <input id="playerQuery" type="text" placeholder="Ex: Kylian Mbappe" />
          <button id="searchPlayer">Rechercher</button>
        </div>
      </div>

      <div id="clubPanel" class="panel">
        <div class="row">
          <select id="countrySelect"><option value="">Pays</option></select>
          <input id="seasonInput" type="number" min="2020" max="2030" value="2024" />
        </div>
        <div class="row">
          <select id="leagueSelect" disabled><option value="">Championnat</option></select>
          <select id="clubSelect" disabled><option value="">Club</option></select>
          <button id="loadSquad" disabled>Charger</button>
        </div>
      </div>

      <div id="status" class="status">Prêt.</div>
      <p class="muted small">La recherche par sélections nationales a été retirée car non fonctionnelle.</p>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Profil</h3>
        <div id="profile" class="muted">Aucun joueur chargé.</div>
      </div>
      <div class="card">
        <h3>Clubs / résultats</h3>
        <div id="results" class="list"></div>
      </div>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const playerPanel = document.getElementById('playerPanel');
    const clubPanel = document.getElementById('clubPanel');
    const statusEl = document.getElementById('status');
    const profileEl = document.getElementById('profile');
    const resultsEl = document.getElementById('results');

    const playerQuery = document.getElementById('playerQuery');
    const searchPlayer = document.getElementById('searchPlayer');

    const countrySelect = document.getElementById('countrySelect');
    const seasonInput = document.getElementById('seasonInput');
    const leagueSelect = document.getElementById('leagueSelect');
    const clubSelect = document.getElementById('clubSelect');
    const loadSquad = document.getElementById('loadSquad');

    tabs.forEach(tab => tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.toggle('active', t === tab));
      const isPlayer = tab.dataset.mode === 'player';
      playerPanel.classList.toggle('active', isPlayer);
      clubPanel.classList.toggle('active', !isPlayer);
    }));

    async function apiFetch(path) {
      const res = await fetch(`/api${path}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erreur API');
      return data;
    }

    function setStatus(msg) { statusEl.textContent = msg; }

    function renderProfile(player) {
      if (!player) {
        profileEl.textContent = 'Aucun joueur trouvé.';
        return;
      }
      const birth = player.birth || {};
      profileEl.innerHTML = `
        <div><strong>${player.name || '-'}</strong></div>
        <div class="small muted">Nationalité: ${player.nationality || '-'}</div>
        <div class="small muted">Âge: ${player.age || '-'}</div>
        <div class="small muted">Poste: ${player.position || '-'}</div>
        <div class="small muted">Naissance: ${birth.place || '-'}, ${birth.country || '-'}</div>
      `;
    }

    function renderList(items, mapFn) {
      resultsEl.innerHTML = items.length
        ? items.map(mapFn).join('')
        : '<div class="muted">Aucun résultat.</div>';
    }

    async function loadCountries() {
      try {
        const data = await apiFetch('/countries');
        const countries = (data.response || []).map(c => c.name).filter(Boolean).sort((a,b)=>a.localeCompare(b));
        countrySelect.innerHTML = '<option value="">Pays</option>' + countries.map(c => `<option value="${c}">${c}</option>`).join('');
      } catch (e) {
        setStatus(`Erreur chargement pays: ${e.message}`);
      }
    }

    searchPlayer.addEventListener('click', async () => {
      const q = playerQuery.value.trim();
      if (!q) return setStatus('Saisissez un nom de joueur.');
      try {
        setStatus('Recherche du joueur...');
        const data = await apiFetch(`/players/profiles?search=${encodeURIComponent(q)}`);
        const first = (data.response || [])[0]?.player;
        if (!first) {
          renderProfile(null);
          renderList([], () => '');
          return setStatus('Aucun joueur trouvé.');
        }
        renderProfile(first);

        const teamsData = await apiFetch(`/players/teams?player=${first.id}`);
        const teams = (teamsData.response || []).map(t => t.team).filter(Boolean);
        renderList(teams, t => `<div class="item"><strong>${t.name}</strong><div class="small muted">${t.country || '-'}</div></div>`);
        setStatus(`Profil chargé pour ${first.name}.`);
      } catch (e) {
        setStatus(`Erreur: ${e.message}`);
      }
    });

    countrySelect.addEventListener('change', async () => {
      const country = countrySelect.value;
      leagueSelect.disabled = true;
      clubSelect.disabled = true;
      loadSquad.disabled = true;
      leagueSelect.innerHTML = '<option value="">Championnat</option>';
      clubSelect.innerHTML = '<option value="">Club</option>';
      if (!country) return;

      try {
        setStatus('Chargement des championnats...');
        const data = await apiFetch(`/leagues?country=${encodeURIComponent(country)}&season=${seasonInput.value}`);
        const leagues = (data.response || []).map(x => x.league).filter(Boolean);
        leagueSelect.innerHTML = '<option value="">Championnat</option>' +
          leagues.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
        leagueSelect.disabled = false;
        setStatus('Choisissez un championnat.');
      } catch (e) {
        setStatus(`Erreur championnats: ${e.message}`);
      }
    });

    leagueSelect.addEventListener('change', async () => {
      clubSelect.disabled = true;
      loadSquad.disabled = true;
      if (!leagueSelect.value) return;
      try {
        setStatus('Chargement des clubs...');
        const data = await apiFetch(`/teams?league=${leagueSelect.value}&season=${seasonInput.value}`);
        const clubs = (data.response || []).map(x => x.team).filter(Boolean);
        clubSelect.innerHTML = '<option value="">Club</option>' + clubs.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        clubSelect.disabled = false;
        setStatus('Choisissez un club.');
      } catch (e) {
        setStatus(`Erreur clubs: ${e.message}`);
      }
    });

    clubSelect.addEventListener('change', () => {
      loadSquad.disabled = !clubSelect.value;
    });

    loadSquad.addEventListener('click', async () => {
      try {
        setStatus('Chargement de l\'effectif...');
        const data = await apiFetch(`/players/squads?team=${clubSelect.value}`);
        const players = (data.response || [])[0]?.players || [];
        renderList(players, p => `
          <div class="item">
            <strong>${p.name}</strong>
            <div class="small muted">${p.position || '-'} • #${p.number || '-'}</div>
          </div>
        `);
        setStatus(`Effectif chargé (${players.length} joueurs).`);
      } catch (e) {
        setStatus(`Erreur effectif: ${e.message}`);
      }
    });

    loadCountries();
  </script>
</body>
</html>
